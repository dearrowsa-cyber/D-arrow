version: '3.8'

services:
  d-arrow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: d-arrow-app-new
    user: "root"
    restart: unless-stopped
    ports:
      - "127.0.0.1:3031:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: "production"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
      NEXT_PUBLIC_CHATBOT_ENABLED: "${NEXT_PUBLIC_CHATBOT_ENABLED}"
      DATABASE_URL: "${DATABASE_URL}"
      POSTGRES_URL: "${POSTGRES_URL}"
      POSTGRES_PRISMA_URL: "${POSTGRES_PRISMA_URL}"
      POSTGRES_URL_NON_POOLING: "${POSTGRES_URL_NON_POOLING}"
      DATABASE_URL_UNPOOLED: "${DATABASE_URL_UNPOOLED}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DATABASE: "${POSTGRES_DATABASE}"
      PGDATABASE: "${PGDATABASE}"
      PGHOST: "${PGHOST}"
      PGPASSWORD: "${PGPASSWORD}"
      PGUSER: "${PGUSER}"
      NEON_PROJECT_ID: "${NEON_PROJECT_ID}"
      CONTACT_RECIPIENT: "${CONTACT_RECIPIENT}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_REJECT_UNAUTHORIZED: "${SMTP_REJECT_UNAUTHORIZED}"
      ZAI_API_KEY: "${ZAI_API_KEY}"
      ZAI_API_BASE: "${ZAI_API_BASE}"
      ZAI_MODEL: "${ZAI_MODEL}"
      NEXT_PUBLIC_N8N_WEBHOOK_URL: "${NEXT_PUBLIC_N8N_WEBHOOK_URL}"
      CRON_SECRET: "${CRON_SECRET}"
      BLOG_API_SECRET_KEY: "${BLOG_API_SECRET_KEY}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
    volumes:
      - d_arrow_uploads:/app/public/uploads

volumes:
  d_arrow_uploads:
